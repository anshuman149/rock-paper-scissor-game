<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissor Game</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <header>
    <h1>Rock Paper Scissor Game</h1>
  </header>

  <div id="move">Make your move!</div>

  <main>
    <!-- Image row -->0
    <div class="img">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Rock.png" alt="Rock">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Paper.png" alt="Paper">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Scissors.png" alt="Scissors">
    </div>

    <!-- Choice buttons -->
    <div class="choices">
      <button id="rock" class="choice">Rock</button>
      <button id="paper" class="choice">Paper</button>
      <button id="scissor" class="choice">Scissor</button>
    </div>
  </main>

  <!-- Result section -->
  <div id="result">
    <div class="score">
      Score: <span id="player-score">0</span> - <span id="computer-score">0</span>
    </div>
    <div id="labels">
      <p>YOU</p>
      <p>COMPUTER</p>
    </div>
    <div id="message">Make your move!</div>
    <button id="reset">Reset Game</button>
  </div>

  <script src="rockpaperscissor.js"></script>
</body>
</html>
